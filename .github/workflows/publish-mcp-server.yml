name: Publish MCP Server

# Trigger: tag push mcp/v* — publishes @lucairn/mcp-server to npm via
# classic NPM_TOKEN secret. Stage 3 first-publish; convert to OIDC
# trusted publisher post-publish if desired.

on:
  push:
    tags:
      - 'mcp/v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Verify dependency signatures
        run: npm audit signatures
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
      - name: Publish to npm
        # npm provenance (Sigstore Fulcio + Rekor) is INERT by default:
        # --provenance is added ONLY when the repo variable
        # ENABLE_NPM_PROVENANCE == 'true'. Unset (default) => publishes
        # exactly as before, no provenance, and the job is granted NO
        # OIDC token (the permissions block is contents:read only —
        # least-privilege while provenance is off).
        #
        # ACTIVATION (all three required, in this order):
        #   1. Revisit the 8-sub-processor list to add Fulcio (8 -> 9).
        #   2. Add `id-token: write` to the job `permissions:` block above.
        #   3. Set repo variable vars.ENABLE_NPM_PROVENANCE = 'true'.
        # FAIL-SAFE: if (3) is flipped WITHOUT doing (2), then
        # `npm publish --provenance` ERRORS (it cannot mint the OIDC
        # token) rather than publishing without provenance — so provenance
        # never silently no-ops on a provenance-intended release.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public ${{ vars.ENABLE_NPM_PROVENANCE == 'true' && '--provenance' || '' }}
