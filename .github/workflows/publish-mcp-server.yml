name: Publish MCP Server

# Trigger: tag push mcp/v* — publishes @lucairn/mcp-server to npm via
# classic NPM_TOKEN secret. Stage 3 first-publish; convert to OIDC
# trusted publisher post-publish if desired.

on:
  push:
    tags:
      - 'mcp/v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write enables npm provenance OIDC. Harmless when
      # --provenance is NOT passed (default). See ENABLE_NPM_PROVENANCE below.
      id-token: write
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Verify dependency signatures
        run: npm audit signatures
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
      - name: Publish to npm
        # npm provenance (Sigstore Fulcio + Rekor) is INERT by default:
        # --provenance is added ONLY when the repo variable
        # ENABLE_NPM_PROVENANCE == 'true'. Unset (default) => publishes
        # exactly as before, no provenance. DO NOT enable until the
        # 8-sub-processor list is revisited to add Fulcio (see PR body).
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public ${{ vars.ENABLE_NPM_PROVENANCE == 'true' && '--provenance' || '' }}
